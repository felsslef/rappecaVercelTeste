<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ananias&display=swap">
    <link rel="stylesheet" href="../css/style.css">
    <title>Rapecca</title>
</head>
<body class="rapecca-page">
    <header>
        <div class="nav-wrapper">
             <img src="../img/logoRapecca.png" alt="Logo Rapecca">
            <nav>
                <ul>
                    <li><a href="Rapecca.html">Rapecca</a></li>
                    <li><a href="Projetos.html">Projetos</a></li>
                    <li><a href="Null.html">Null</a></li>
                    <li><a href="Sobre-nos.html">Sobre nós</a></li>
                    <li><a href="Participe.html">Participe</a></li>
                </ul>
            </nav>
        </div>
    </header>

   
    <div class="carousel-container">
        <div class="carousel">
            <div class="slide active"><img src="../img/carrossel/carrossel1.jpg" alt="Imagem 1"></div>
            <div class="slide"><img src="../img/carrossel/carrossel2.jpg" alt="Imagem 2"></div>
            <div class="slide"><img src="../img/imagem3.jpg" alt="Imagem 3"></div>
            <button class="prev">‹</button>
            <button class="next">›</button>
            <div class="carousel-caption">Descrição da imagem atual.</div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-contact">
                <h4>Contato</h4>
                <p>Email: <a href="mailto:contato@rappecca.org">contato@rappecca.org</a></p>
                <p>Telefone: (00) 0000-0000</p>
                <p>Endereço: Rua Exemplo, 123</p>
            </div>
            <div class="footer-admin">
                <h4>Área do Administrador</h4>
                <p>Solicite acesso administrativo <a href="#" id="admin-docs-link" data-docs-placeholder="SUBSTITUA_COM_URL_DO_DOCS">aqui</a>.</p>
                <!-- ATENÇÃO: substitua o atributo href do link acima com a URL do seu documento (docs).
                     Exemplo: <a href="https://link-para-seus-docs.example">aqui</a>
                     O atributo `data-docs-placeholder` indica onde alterar. -->
            </div>
            <div class="footer-about">
                <p>Rapecca &copy; <span id="year"></span></p>
                <p>Conectando projetos e pessoas.</p>
            </div>
        </div>
    </footer>
    
    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const descriptions = [
            'Descrição da imagem 1.',
            'Descrição da imagem 2.',
            'Descrição da imagem 3.'
        ];

        function showSlide(index) {
            slides.forEach(slide => slide.classList.remove('active'));
            slides[index].classList.add('active');
            document.querySelector('.carousel-caption').textContent = descriptions[index];
        }

        document.querySelector('.next').addEventListener('click', () => {
            currentSlide = (currentSlide + 1) % slides.length;
            showSlide(currentSlide);
        });

        document.querySelector('.prev').addEventListener('click', () => {
            currentSlide = (currentSlide - 1 + slides.length) % slides.length;
            showSlide(currentSlide);
        });

        showSlide(currentSlide);
        // set footer year
        const yearEl = document.getElementById('year');
        if (yearEl) yearEl.textContent = new Date().getFullYear();

        // admin request form handling (placeholder)
        const adminForm = document.getElementById('admin-request-form');
        const adminMsg = document.getElementById('admin-msg');
        if (adminForm) {
            adminForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const email = document.getElementById('admin-email').value.trim();
                if (!email) {
                    adminMsg.textContent = 'Por favor insira um e-mail válido.';
                    return;
                }
                // Placeholder: aqui você pode integrar com backend para processar a solicitação
                adminMsg.textContent = 'Solicitação enviada. Verificaremos e entraremos em contato.';
                adminForm.reset();
            });
        }
    </script>
</body>
</html>
