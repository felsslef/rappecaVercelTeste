<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ananias&display=swap">
    <link rel="stylesheet" href="../css/style.css">
    <title>Detalhes do Projeto - Rapecca</title>
    <style>
        /* Um CSS básico só para estruturar a página do post, você pode adaptar no seu style.css depois */

        body {
            background-image: url('../img/ferramentasRed.png');
            background-repeat: repeat-y;
            background-position: right top;
            background-size: auto 1300px;
            background-color: #9AA36A;
            background-attachment: fixed;
        }
        
        .post-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            font-family: sans-serif;
            background-color: transparent;
        }
        .post-title {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        .post-image {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .post-content {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #444;
        }
        .btn-voltar {
            position:  fixed; /* Segue o scroll como o header */
            left: 40px; /* Distância da borda esquerda do monitor */
            top: 150px; /* Distância do topo. Ajuste esse número se ele ficar em cima do seu menu! */
            
            text-decoration: none;
            color: #33593d;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 5px;
            transition: 0.2s ease-in-out;
            background-color: transparent; /* Fundo transparente inicialmente */
            z-index: 1000; /* Fica acima do conteúdo */
        }

        .btn-voltar:hover {
            background-color: #33593d;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-wrapper">
            <img src="../img/logoRapecca.png" alt="Logo Rapecca">
            <nav>
                <ul>
                    <li><a href="index.html">Rapecca</a></li>
                    <li><a href="Projetos.html">Projetos</a></li>
                    <li><a href="Null.html">Null</a></li>
                    <li><a href="Sobre-nos.html">Sobre nós</a></li>
                    <li><a href="Participe.html">Participe</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section>
        <div class="post-container" id="post-container">
            <p style="text-align: center;">Carregando detalhes do projeto...</p>
        </div>
    </section>

    <script>
        async function carregarDetalhes() {
            const container = document.getElementById('post-container');
            const pbUrl = 'http://127.0.0.1:8090';
            
            // 1. Pega o ID que está na URL (ex: ?id=4uitz61n2vtcfhi)
            const params = new URLSearchParams(window.location.search);
            const postId = params.get('id');

            // Se alguém acessar a página sem clicar num projeto, volta pra lista
            if (!postId) {
                window.location.href = 'Projetos.html';
                return;
            }

            try {
                // 2. Busca APENAS o post específico usando o ID
                const response = await fetch(`${pbUrl}/api/collections/posts/records/${postId}`);
                
                if (!response.ok) {
                    throw new Error('Projeto não encontrado');
                }

                const post = await response.json();

                // 3. Monta a imagem
                const fotoUrl = post.Capa 
                    ? `${pbUrl}/api/files/${post.collectionId}/${post.id}/${post.Capa}`
                    : '../img/logoRapecca.png';

                // 4. Injeta as informações no HTML
                container.innerHTML = `
                    <a href="Projetos.html" class="btn-voltar">← Voltar para Projetos</a>
                    <h1 class="post-title">${post.Titulo}</h1>
                    <img src="${fotoUrl}" alt="${post.Titulo}" class="post-image">
                    <div class="post-content">
                        ${post.Texto}
                    </div>
                `;

            } catch (error) {
                console.error("Erro:", error);
                container.innerHTML = `
                    <div style="text-align: center;">
                        <h2>Ops! Projeto não encontrado.</h2>
                        <p>O projeto que você tentou acessar pode ter sido removido ou o servidor está offline.</p>
                        <br>
                        <a href="Projetos.html" class="btn-voltar">Voltar para a lista</a>
                    </div>
                `;
            }
        }

        carregarDetalhes();
    </script>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-item">
                <strong>Telefone</strong>
                <p>+55 (XX) XXXX-XXXX</p>   
            </div>
            <div class="footer-item">
                <strong>Endereço</strong>
                <p>Rua Exemplo, 123 - Cidade - Estado</p>
            </div>
            <div class="footer-item">
                <strong>Email</strong>
                <p>contato@rappecca.com.br</p>
            </div>
        </div>
    </footer>
</body>
</html>
